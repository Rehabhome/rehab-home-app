const db = {
  get: async (table, params="") => {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`}
    });
    return r.json();
  },
  post: async (table, body) => {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
      method:"POST",
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=representation"},
      body:JSON.stringify(body)
    });
    return r.json();
  },
  patch: async (table, id, body) => {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, {
      method:"PATCH",
      headers:{apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, "Content-Type":"application/json", Prefer:"return=representation"},
      body:JSON.stringify(body)
    });
    return r.json();
  }
};

function generarPDF(pac, evo, prof) {
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Evolución</title>
  <style>body{font-family:Arial,sans-serif;margin:40px;color:#1a1a2e;font-size:13px}.logo{font-size:20px;font-weight:700;color:#1a6b8a}h2{color:#1a6b8a;border-bottom:1px solid #eee;padding-bottom:6px;margin:20px 0 10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}.fl label{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;display:block;margin-bottom:3px}.fl p{margin:0;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:6px;padding:8px}.box{background:#F9FAFB;border:1px solid #E5E7EB;border-radius:8px;padding:12px;margin-bottom:12px}.box label{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;display:block;margin-bottom:6px}.box p{margin:0;line-height:1.6}.footer{margin-top:40px;border-top:1px solid #eee;padding-top:12px;font-size:11px;color:#9CA3AF;display:flex;justify-content:space-between}</style>
  </head><body>
  <div style="border-bottom:2px solid #1a6b8a;padding-bottom:16px;margin-bottom:24px;display:flex;justify-content:space-between">
    <div><div class="logo">REHAB HOME</div><div style="font-size:11px;color:#6B7280">Registro clínico</div></div>
    <div style="text-align:right;font-size:12px;color:#6B7280">${evo.fecha} · ${evo.hora}</div>
  </div>
  <h2>Datos del paciente</h2>
  <div class="grid"><div class="fl"><label>Nombre</label><p>${pac.nombre}</p></div><div class="fl"><label>RUT</label><p>${pac.rut}</p></div><div class="fl"><label>Dirección</label><p>${pac.direccion}${pac.comuna?", "+pac.comuna:""}</p></div><div class="fl"><label>Email</label><p>${pac.email}</p></div></div>
  <h2>Profesional</h2>
  <div class="grid"><div class="fl"><label>Nombre</label><p>${prof?prof.nombre:"-"}</p></div><div class="fl"><label>Especialidad</label><p>${prof?prof.especialidad:"-"}</p></div></div>
  <h2>Evolución</h2>
  <div class="box"><label>Anamnesis</label><p>${evo.anamnesis}</p></div>
  <div class="box"><label>Procedimientos</label><p>${evo.procedimientos}</p></div>
  <div class="box"><label>Post sesión</label><p>${evo.post_sesion}</p></div>
  <div class="footer"><span>Rehab Home · ${new Date().toLocaleDateString("es-CL")}</span><span>${prof?prof.nombre:""}</span></div>
  </body></html>`;
  const w = window.open("","_blank");
  w.document.write(html);
  w.document.close();
  setTimeout(()=>w.print(),500);
}

/* =================== Normalizadores (tolerantes a tus datos) =================== */
const sinAcentos = (s) =>
  (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();

// Reconoce "Kinesiólogo/a", "kine", "klgo", "fono", "fonoaudiologia", "TO", "terapia ocupacional", etc.
function normalizarDisciplina(valor) {
  const s = sinAcentos(valor);
  if (/(kine|klg|kinesio)/.test(s)) return "kinesiologia";
  if (/(fono|fga|fonoaud)/.test(s)) return "fonoaudiologia";
  if (/(terapia ocupacional|\bto\b|t\.o|terap)/.test(s)) return "terapia_ocupacional";
  return null;
}

// ⇦ AJUSTA: cómo guardas los servicios del paciente en Supabase.
// Soporta: array (["kinesiologia","fono"]), texto separado por comas,
// o columnas booleanas (servicio_kinesiologia: true, etc.).
function getServiciosPaciente(paciente) {
  if (!paciente) return [];
  let bruto = paciente.servicios ?? paciente.servicio ?? paciente.especialidades;
  if (typeof bruto === "string") bruto = bruto.split(/[,;/]+/);
  if (Array.isArray(bruto)) {
    return [...new Set(bruto.map(normalizarDisciplina).filter(Boolean))];
  }
  // columnas booleanas tipo servicio_kinesiologia / kinesiologia: true
  const out = [];
  Object.keys(paciente).forEach((k) => {
    if (paciente[k] === true) {
      const d = normalizarDisciplina(k);
      if (d) out.push(d);
    }
  });
  return [...new Set(out)];
}

function disciplinasProfesional(profesional) {
  if (!profesional) return [];
  const fuentes = [profesional.disciplina, profesional.profesion, profesional.especialidad, profesional.servicio];
  const ds = fuentes.map(normalizarDisciplina).filter(Boolean);
  return [...new Set(ds)];
}

/* =================== EL FILTRO CLAVE =================== */
// Informes disponibles = (servicios del paciente) ∩ (disciplina del profesional).
// admin=true ⇒ ve todos los informes de los servicios que tiene el paciente.
function informesDisponibles(paciente, profesional, { admin = false } = {}) {
  const servicios = getServiciosPaciente(paciente);
  const discProf = admin ? Object.keys(TIPOS_POR_DISCIPLINA) : disciplinasProfesional(profesional);
  const habilitadas = discProf.filter((d) => servicios.includes(d));
  return habilitadas.flatMap((d) =>
    (TIPOS_POR_DISCIPLINA[d] || []).map((x) => ({ ...x, disciplina: d }))
  );
}

  export async function cargarInforme(supabase, { pacienteId, profesionalId, tipo, periodo }) {

      supabase.from("pacientes").select("*").eq("id", pacienteId).single(),
      supabase.from("profesionales").select("*").eq("id", profesionalId).single(),
      supabase.from("evoluciones").select("*").eq("paciente_id", pacienteId).order("fecha", { ascending: true }),
    ]);
    return mapearADatosInforme({ paciente, profesional, evoluciones, tipo, periodo });
  }
*/

// ⇦ AJUSTA: traduce tus columnas de Supabase a las secciones del informe.
function mapearADatosInforme({ paciente, profesional, evoluciones = [], periodo, fechaEvaluacion }) {
  return {
    paciente: {
      nombre: paciente?.nombre ?? [paciente?.nombres, paciente?.apellidos].filter(Boolean).join(" "),
      rut: paciente?.rut,
      edad: paciente?.edad,
      comuna: paciente?.comuna,
    },
    profesional: {
      nombre: profesional?.nombre ?? [profesional?.nombres, profesional?.apellidos].filter(Boolean).join(" "),
      rut: profesional?.rut,
      profesion: profesional?.profesion ?? DISCIPLINA_LABEL[disciplinasProfesional(profesional)[0]],
      registroSuperintendencia: profesional?.registro_superintendencia ?? profesional?.registroSuperintendencia,
    },
    periodo,
    fechaEvaluacion,
    evoluciones: (evoluciones || []).map((e) => ({
      fecha: e.fecha, hora: e.hora, texto: e.texto ?? e.evolucion ?? e.descripcion,
    })),
    // Las secciones de texto/lista (diagnósticos, objetivos, etc.) las completas
    // desde tu formulario o desde columnas equivalentes en tus tablas.
    diagnosticos: paciente?.diagnosticos,
    objetivos: paciente?.objetivos,
  };
}

const asArray = (v) => (Array.isArray(v) ? v : v == null ? [] : [v]);
function Campo({ label, value }) {
  return (<div style={{ minWidth: 0 }}><div style={{ fontSize: 10.5, letterSpacing: ".07em", textTransform: "uppercase", color: SLATE, fontWeight: 600 }}>{label}</div><div style={{ fontSize: 14.5, color: INK, marginTop: 2, fontWeight: 500 }}>{value || "—"}</div></div>);
}
const tituloBarra = (t) => (<h2 style={{ fontSize: 13, letterSpacing: ".04em", textTransform: "uppercase", color: TEAL, fontWeight: 700, margin: 0, paddingBottom: 6, borderBottom: `2px solid ${TEAL}` }}>{t}</h2>);
const Lista = ({ items }) => (<ul style={{ margin: 0, paddingLeft: 18 }}>{items.map((t, i) => <li key={i} style={{ marginBottom: 5 }}>{t}</li>)}</ul>);
const Texto = ({ value }) => asArray(value).map((t, i) => <p key={i} style={{ margin: i ? "8px 0 0" : 0 }}>{t}</p>);
function Campos({ value }) {
  const pares = Array.isArray(value) ? value : Object.keys(value).map((k) => ({ label: k, value: value[k] }));
  return (<div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(170px, 1fr))", gap: "12px 22px" }}>{pares.map((p, i) => <Campo key={i} label={p.label} value={p.value} />)}</div>);
}
const Evoluciones = ({ items }) => (<div style={{ display: "flex", flexDirection: "column", gap: 16 }}>{items.map((e, i) => (<div key={i} style={{ breakInside: "avoid" }}><div style={{ fontSize: 11, fontWeight: 700, color: TEAL, letterSpacing: ".03em" }}>{e.fecha}{e.hora ? ` · ${e.hora} hrs` : ""}</div><p style={{ margin: "4px 0 0" }}>{e.texto}</p></div>))}</div>);
function Escala({ items, columnas, value }) {
  const cols = columnas || ["Puntaje", "Observación"]; const datos = value || {};
  const cell = { padding: "7px 10px", fontSize: 13.5 }; const grid = `1.6fr ${cols.map(() => "1fr").join(" ")}`;
  return (<div style={{ borderRadius: 8, overflow: "hidden" }}>
    <div style={{ display: "grid", gridTemplateColumns: grid, background: TEAL }}><div style={{ ...cell, color: "#fff", fontWeight: 700, fontSize: 11.5, textTransform: "uppercase", letterSpacing: ".04em" }}>Ítem</div>{cols.map((c, i) => <div key={i} style={{ ...cell, color: "#fff", fontWeight: 700, fontSize: 11.5, textTransform: "uppercase", letterSpacing: ".04em" }}>{c}</div>)}</div>
    {items.map((it, r) => { const row = datos[it] || {}; return (<div key={r} style={{ display: "grid", gridTemplateColumns: grid, background: r % 2 ? "#fff" : TINT }}><div style={{ ...cell, fontWeight: 600, color: INK }}>{it}</div>{cols.map((c, i) => <div key={i} style={{ ...cell, color: INK }}>{row[c] || "\u00A0"}</div>)}</div>); })}
  </div>);
}
function contenidoVacio(tipo, v) { if (tipo === "escala") return false; if (v == null) return true; if (Array.isArray(v)) return v.length === 0; if (typeof v === "object") return Object.keys(v).length === 0; return String(v).trim() === ""; }
function Seccion({ s, data }) {
  const v = data[s.key]; if (contenidoVacio(s.tipo, v)) return null;
  let cuerpo = null;
  if (s.tipo === "texto") cuerpo = <Texto value={v} />;
  else if (s.tipo === "lista") cuerpo = <Lista items={asArray(v)} />;
  else if (s.tipo === "evoluciones") cuerpo = <Evoluciones items={asArray(v)} />;
  else if (s.tipo === "campos") cuerpo = <Campos value={v} />;
  else if (s.tipo === "escala") cuerpo = <Escala items={s.items} columnas={s.columnas} value={v} />;
  return (<section style={{ marginTop: 26, breakInside: "avoid" }}>{tituloBarra(s.titulo)}<div style={{ marginTop: 12, fontSize: 14.5, lineHeight: 1.6, color: INK }}>{cuerpo}</div></section>);
}

            </div>
          </section>

}

/* --- Formulario de entrada de datos por tipo --- */

/* Campos del formulario según tipo */
const CAMPOS_FORM = Object.fromEntries(
  Object.entries(PRESETS).map(([tipo, preset]) => [
    tipo,
    preset.secciones.map(s => ({
      key: s.key,
      label: s.titulo,
      tipo: s.tipo,
      items: s.items || null,
      columnas: s.columnas || null,
    }))
  ])
);

function FormularioInforme({ tipo, tipoLabel, paciente, profesional, onGuardado, onCancelar }) {
  const campos = CAMPOS_FORM[tipo] || [];
  const [form, setForm] = React.useState({ fecha: HOY });
  const [saving, setSaving] = React.useState(false);
  const [error, setError] = React.useState('');

  const setVal = (key, val) => setForm(f => ({ ...f, [key]: val }));

  const handleGuardar = async () => {
    setSaving(true); setError('');
    try {
      // Convertir campos lista (textarea → array por líneas)
      const datos = { ...form };
      campos.forEach(c => {
        if (c.tipo === 'lista' && typeof datos[c.key] === 'string') {
          datos[c.key] = datos[c.key].split('\n').map(l=>l.trim()).filter(Boolean);
        }
        if (c.tipo === 'evoluciones' && typeof datos[c.key] === 'string') {
          datos[c.key] = datos[c.key] ? [{ fecha: datos.fecha, hora: '', texto: datos[c.key] }] : [];
        }
      });
      const res = await fetch(`${SUPABASE_URL}/rest/v1/informes`, {
        method:'POST',
        headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}`, 'Content-Type':'application/json', Prefer:'return=representation' },
        body: JSON.stringify({ paciente_id: paciente.id, profesional_id: profesional?.id||null, tipo, fecha: form.fecha||HOY, datos })
      });
      if (!res.ok) throw new Error(await res.text());
            // Enviar email al paciente via Netlify Function + Brevo
      if (EMAIL_ENABLED && paciente?.email) {
        try {
          const camposEmail = campos
            .filter(c => form[c.key] !== undefined && form[c.key] !== null && String(form[c.key]).trim() !== '')
            .map(c => ({ label: c.label, value: form[c.key] }));
          await fetch('/.netlify/functions/send-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              to: paciente.email,
              paciente_nombre: paciente.nombre || '',
              tipo_informe: tipoLabel,
              fecha: form.fecha || HOY,
              profesional_nombre: profesional?.nombre || '',
              campos: camposEmail,
            }),
          });
        } catch(emailErr) {
          console.warn('Email no enviado:', emailErr);
        }
      }
      onGuardado();
    } catch(e) { setError('Error al guardar: ' + e.message); }
    setSaving(false);
  };

  const iLbl = { display:'block', fontSize:11, fontWeight:700, color:SLATE, textTransform:'uppercase', letterSpacing:'.04em', marginBottom:4 };
  const iInp = { width:'100%', padding:'8px 10px', borderRadius:6, border:`1px solid ${HAIR}`, fontSize:13, outline:'none', fontFamily:'inherit' };
  const iTxt = { ...iInp, minHeight:80, resize:'vertical' };

  return (
    <div style={{ padding:'16px 20px' }}>
      <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:18 }}>
        <button style={{ background:'#fff', color:TEAL, border:`1px solid ${TEAL}`, borderRadius:6, padding:'6px 12px', fontSize:12, cursor:'pointer' }} onClick={onCancelar}>← Volver</button>
        <h3 style={{ margin:0, fontSize:15, fontWeight:700, color:TEAL }}>{tipoLabel}</h3>
      </div>
      <div style={{ display:'grid', gap:14 }}>
        <div>
          <label style={iLbl}>Fecha</label>
          <input type="date" style={iInp} value={form.fecha||HOY} onChange={e=>setVal('fecha',e.target.value)} />
        </div>
        {campos.map(c => (
          <div key={c.key}>
            <label style={iLbl}>{c.label}</label>
            {c.tipo==='escala' ? (
              <EscalaForm items={c.items||[]} columnas={c.columnas||['Puntaje','Observación']} value={form[c.key]||{}} onChange={v=>setVal(c.key,v)} />
            ) : c.tipo==='campos' ? (
              <textarea style={{...iTxt, minHeight:60}} value={form[c.key]||''} placeholder="Formato: etiqueta: valor (uno por línea)" onChange={e=>setVal(c.key, e.target.value)} />
            ) : c.tipo==='lista' ? (
              <textarea style={{...iTxt, minHeight:70}} value={form[c.key]||''} placeholder="Una por línea" onChange={e=>setVal(c.key, e.target.value)} />
            ) : (
              <textarea style={{...iTxt, minHeight:80}} value={form[c.key]||''} onChange={e=>setVal(c.key, e.target.value)} />
            )}
          </div>
        ))}
      </div>
      {error && <div style={{ color:'#DC2626', fontSize:12, marginTop:10 }}>{error}</div>}
      <div style={{ display:'flex', gap:10, marginTop:20 }}>
        <button style={{ background:TEAL, color:'#fff', border:'none', borderRadius:6, padding:'8px 16px', fontSize:13, cursor:'pointer', fontWeight:700 }} onClick={handleGuardar} disabled={saving}>
          {saving ? 'Guardando…' : '💾 Guardar informe'}
        </button>
        <button style={{ background:'#fff', color:TEAL, border:`1px solid ${TEAL}`, borderRadius:6, padding:'7px 12px', fontSize:13, cursor:'pointer' }} onClick={onCancelar}>Cancelar</button>
      </div>
    </div>
  );
}

function EscalaForm({ items, columnas, value, onChange }) {
  const cols = columnas || ['Puntaje', 'Observación'];
  const cell = { padding:'6px 8px', fontSize:12 };
  const grid = `1.6fr ${cols.map(()=>'1fr').join(' ')}`;
  return (
    <div style={{ borderRadius:8, overflow:'hidden', fontSize:12 }}>
      <div style={{ display:'grid', gridTemplateColumns:grid, background:TEAL }}>
        <div style={{...cell, color:'#fff', fontWeight:700}}>Ítem</div>
        {cols.map((c,i)=><div key={i} style={{...cell, color:'#fff', fontWeight:700}}>{c}</div>)}
      </div>
      {items.map((it,r)=>{
        const row = (value&&value[it]) || {};
        return (
          <div key={r} style={{ display:'grid', gridTemplateColumns:grid, background: r%2 ? '#fff' : '#f5f9fb', borderBottom:'1px solid #e6edf0' }}>
            <div style={{...cell, fontWeight:600, color:'#1f2d3d'}}>{it}</div>
            {cols.map((c,i)=>(
              <input key={i} type="text" style={{ border:'none', padding:'6px 8px', fontSize:12, background:'transparent', width:'100%', outline:'none' }}
                value={row[c]||''} onChange={e=>onChange({...value, [it]:{...row,[c]:e.target.value}})} />
            ))}
          </div>
        );
      })}
    </div>
  );
}

/* --- Panel principal --- */
function PanelInformes({ paciente, profesional, admin }) {
  const [informes, setInformes] = React.useState([]);
  const [tipoActivo, setTipoActivo] = React.useState(null);
  const [modo, setModo] = React.useState('lista'); // 'lista' | 'form' | 'ver'
  const [informeVer, setInformeVer] = React.useState(null);
  const [loading, setLoading] = React.useState(true);

  const disponibles = React.useMemo(() => informesDisponibles(paciente, profesional, { admin }), [paciente, profesional, admin]);

  React.useEffect(() => {
    if (disponibles.length > 0 && !tipoActivo) setTipoActivo(disponibles[0].tipo);
  }, [disponibles]);

  React.useEffect(() => { loadInformes(); }, [paciente?.id]);

  const loadInformes = async () => {
    setLoading(true);
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/informes?paciente_id=eq.${paciente.id}&order=created_at.desc`, {
        headers: { apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` }
      });
      setInformes(Array.isArray(await res.json()) ? await res.clone().json() : []);
    } catch(e) { setInformes([]); }
    setLoading(false);
  };

  const fuente = "Calibri, 'Segoe UI', system-ui, sans-serif";
  const servicios = getServiciosPaciente(paciente);

  if (disponibles.length === 0) return (
    <div style={{ padding:32, textAlign:'center', color:SLATE }}>
      <div style={{ fontSize:32, marginBottom:12 }}>📋</div>
      <p style={{ fontWeight:600, color:'#1f2d3d' }}>{paciente?.nombre}</p>
      <p style={{ fontSize:13 }}>Servicios: {servicios.map(s=>DISCIPLINA_LABEL[s]).join(', ')||'—'}</p>
      <p style={{ fontSize:13, color:'#9CA3AF', marginTop:8 }}>Este paciente no tiene servicios de tu disciplina.</p>
    </div>
  );

  /* Vista de un informe guardado (renderer original) */
  if (modo === 'ver' && informeVer) {
    const d = informeVer.datos || {};
    const data = {
      ...d,
      paciente: { nombre: paciente?.nombre, rut: paciente?.rut, edad: paciente?.edad, comuna: paciente?.comuna },
      profesional: { nombre: profesional?.nombre, rut: profesional?.rut, profesion: profesional?.especialidad, registroSuperintendencia: profesional?.registro_superintendencia },
      fechaEvaluacion: informeVer.fecha,
      periodo: d.fecha || informeVer.fecha,
    };
    return (
      <div>
        <div style={{ padding:'12px 20px', display:'flex', gap:10, borderBottom:`1px solid ${HAIR}` }} className="no-print">
          <button style={{ background:'#fff', color:TEAL, border:`1px solid ${TEAL}`, borderRadius:6, padding:'6px 12px', fontSize:12, cursor:'pointer' }} onClick={()=>{setModo('lista');setInformeVer(null);}}>← Volver</button>
          <button style={{ background:TEAL, color:'#fff', border:'none', borderRadius:6, padding:'7px 14px', fontSize:13, cursor:'pointer', fontWeight:700 }} onClick={()=>window.print()}>🖨️ Imprimir / PDF</button>
        </div>
        <InformeRehabHome tipo={informeVer.tipo} data={data} />
      </div>
    );
  }

  /* Formulario nuevo */
  if (modo === 'form') {
    const tipoLabel = disponibles.find(t=>t.tipo===tipoActivo)?.titulo || tipoActivo;
    return <FormularioInforme tipo={tipoActivo} tipoLabel={tipoLabel}
      paciente={paciente} profesional={profesional}
      onGuardado={()=>{loadInformes();setModo('lista');}}
      onCancelar={()=>setModo('lista')} />;
  }

  /* Lista de informes */
  const informesTipo = informes.filter(i=>i.tipo===tipoActivo);
  const tipoLabel = disponibles.find(t=>t.tipo===tipoActivo)?.titulo || tipoActivo;

  return (
    <div style={{ fontFamily:fuente }}>
      <div style={{ display:'flex', overflowX:'auto', borderBottom:`1px solid ${HAIR}`, background:'#FAFAFA', paddingLeft:8 }}>
        {disponibles.map(t=>(
          <button key={t.tipo} onClick={()=>{setTipoActivo(t.tipo);setModo('lista');}}
            style={{ padding:'10px 14px', fontSize:12, fontWeight: tipoActivo===t.tipo ? 700 : 500,
              borderBottom: tipoActivo===t.tipo ? `2px solid ${TEAL}` : '2px solid transparent',
              color: tipoActivo===t.tipo ? TEAL : SLATE, background:'none', border:'none',
              borderBottom: tipoActivo===t.tipo ? `2px solid ${TEAL}` : '2px solid transparent',
              cursor:'pointer', whiteSpace:'nowrap' }}>
            {t.titulo}
          </button>
        ))}
      </div>
      <div style={{ padding:'8px 20px', fontSize:12, color:SLATE, borderBottom:`1px solid #F3F4F6`, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <span>{paciente?.nombre} · Servicios: {servicios.map(s=>DISCIPLINA_LABEL[s]).join(', ')||'—'}</span>
        <button style={{ background:TEAL, color:'#fff', border:'none', borderRadius:6, padding:'7px 14px', fontSize:13, cursor:'pointer', fontWeight:700 }} onClick={()=>setModo('form')}>+ Nuevo informe</button>
      </div>
      <div style={{ padding:'16px 20px' }}>
        {loading ? <div style={{textAlign:'center',color:SLATE,padding:32}}>Cargando…</div>
         : informesTipo.length===0 ? (
          <div style={{textAlign:'center',color:'#9CA3AF',padding:32}}>
            <div style={{fontSize:28,marginBottom:8}}>📄</div>
            <p>No hay informes de <strong>{tipoLabel}</strong> para este paciente.</p>
            <button style={{background:TEAL,color:'#fff',border:'none',borderRadius:6,padding:'8px 16px',fontSize:13,cursor:'pointer',fontWeight:700,marginTop:12}} onClick={()=>setModo('form')}>Crear primero</button>
          </div>
         ) : (
          <div style={{display:'grid',gap:8}}>
            {informesTipo.map(inf=>(
              <div key={inf.id} style={{background:'#fff',border:`1px solid ${HAIR}`,borderRadius:8,padding:'14px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:'#1f2d3d'}}>{disponibles.find(t=>t.tipo===inf.tipo)?.titulo}</div>
                  <div style={{fontSize:12,color:SLATE,marginTop:2}}>📅 {inf.fecha}</div>
                </div>
                <button style={{background:'#fff',color:TEAL,border:`1px solid ${TEAL}`,borderRadius:6,padding:'6px 12px',fontSize:12,cursor:'pointer'}} onClick={()=>{setInformeVer(inf);setModo('ver');}}>
                  Ver / Imprimir
                </button>
              </div>
            ))}
          </div>
         )}
      </div>
    </div>
  );
}

function App() {
  const [profesionales,setProfesionales] = useState([]);
  const [pacientes,setPacientes] = useState([]);
  const [evoluciones,setEvoluciones] = useState([]);
  const [emailLog,setEmailLog] = useState([]);
  const [loading,setLoading] = useState(true);
  const [dbError,setDbError] = useState(null);
  const [vista,setVista] = useState("login");
  const [usuario,setUsuario] = useState(null);
  const [rol,setRol] = useState(null);
  const [loginForm,setLoginForm] = useState({usuario:"",password:""});
  const [loginError,setLoginError] = useState("");
  const [pacienteActivo,setPacienteActivo] = useState(null);
  const [form,setForm] = useState({anamnesis:"",procedimientos:"",postSesion:""});
  const [guardado,setGuardado] = useState(false);
  const [emailStatus,setEmailStatus] = useState(null);
  const [adminTab,setAdminTab] = useState("agenda");
  const [adminProf,setAdminProf] = useState(null);
  const [showNewProf,setShowNewProf] = useState(false);
  const [showNewPac,setShowNewPac] = useState(false);
  const [newProf,setNewProf] = useState({nombre:"",especialidad:"Kinesiología",rut:"",email:"",color:COLORES[0]});
  const [newPac,setNewPac] = useState({nombre:"",rut:"",direccion:"",comuna:"",email:"",profesionalId:"",hora:"",fecha:HOY,servicios:[]});
  const [pendingAlert,setPendingAlert] = useState(false);
  const [reminderSent,setReminderSent] = useState(false);
  const [vistaHistorial,setVistaHistorial] = useState(false);
  const [editingPac,setEditingPac] = useState(null);
  const [emailFilter,setEmailFilter] = useState("todos");
  const [fechaSel,setFechaSel] = useState(HOY);
  const [filtroPac,setFiltroPac] = useState("");
  const [reagendando,setReagendando] = useState(null);
  const [reagendaForm,setReagendaForm] = useState({fecha:"",hora:"",profesionalId:"",motivo:""});
  const [reagendaOk,setReagendaOk] = useState(false);
  const [vistaInformes,setVistaInformes] = useState(false);

  const getPxProf = (profId,fecha) => pacientes.filter(p=>p.profesional_id===profId&&(fecha?p.fecha===fecha:true)).sort((a,b)=>a.hora.localeCompare(b.hora));
  const getEvo = pacId => evoluciones.find(e=>e.paciente_id===pacId);
  const getPend = (profId,fecha) => getPxProf(profId,fecha).filter(p=>!getEvo(p.id));

  const loadAll = async () => {
    setLoading(true); setDbError(null);
    try {
      const [pr,pa,ev,em] = await Promise.all([
        db.get("profesionales","order=nombre"),
        db.get("pacientes","order=hora"),
        db.get("evoluciones","order=created_at.desc"),
        db.get("email_log","order=created_at.desc"),
      ]);
      if (!Array.isArray(pr)) throw new Error(JSON.stringify(pr));
      setProfesionales(pr); setPacientes(Array.isArray(pa)?pa:[]);
      setEvoluciones(Array.isArray(ev)?ev:[]); setEmailLog(Array.isArray(em)?em:[]);
    } catch(e) { setDbError("Error de conexión: "+e.message); }
    setLoading(false);
  };

  useEffect(()=>{ loadAll(); },[]);
  useEffect(()=>{ if(rol==="profesional"&&usuario&&getPend(usuario.id,HOY).length>0) setPendingAlert(true); },[rol,usuario,pacientes,evoluciones]);

  const handleLogin = () => {
    if(loginForm.usuario.trim()==="admin"&&loginForm.password==="admin2026"){ setRol("admin");setUsuario(null);setVista("admin");setLoginError("");return; }
    const rn = loginForm.usuario.replace(/[.\-]/g,"").toUpperCase();
    const prof = profesionales.find(p=>getRutLogin(p.rut)===rn&&p.activo);
    if(prof&&loginForm.password===getPassword(prof.rut)){ setRol("profesional");setUsuario(prof);setVista("agenda");setLoginError("");return; }
    setLoginError("RUT o contraseña incorrectos");
  };

  const handleLogout = () => { setRol(null);setUsuario(null);setVista("login");setLoginForm({usuario:"",password:""});setPendingAlert(false);setReminderSent(false); };

  const logEmail = async (tipo,dest,pacNom,asunto,estado) => {
    const now = new Date();
    const hora = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    const row = await db.post("email_log",{tipo,destinatario:dest,paciente:pacNom,asunto,estado,fecha:HOY,hora});
    if(Array.isArray(row)&&row[0]) setEmailLog(prev=>[row[0],...prev]);
  };

  const handleGuardar = async () => {
    const prof = profesionales.find(p=>p.id===pacienteActivo.profesional_id);
    const evoData = {paciente_id:pacienteActivo.id,anamnesis:form.anamnesis,procedimientos:form.procedimientos,post_sesion:form.postSesion,fecha:pacienteActivo.fecha,hora:pacienteActivo.hora};
    const existing = getEvo(pacienteActivo.id);
    let saved;
    if(existing){ saved=await db.patch("evoluciones",existing.id,evoData); if(Array.isArray(saved)&&saved[0]) setEvoluciones(prev=>prev.map(e=>e.id===existing.id?saved[0]:e)); }
    else { saved=await db.post("evoluciones",evoData); if(Array.isArray(saved)&&saved[0]) setEvoluciones(prev=>[saved[0],...prev]); }
    setGuardado(true); setEmailStatus("ok");
    await logEmail("evolucion",pacienteActivo.email,pacienteActivo.nombre,`Rehab Home | ${prof?prof.especialidad:""} | Evolución de su atención - ${pacienteActivo.fecha}`,"enviado");
  };

  const handleReminder = async () => {
    if(!usuario) return;
    await logEmail("recordatorio",usuario.email,usuario.nombre,`Rehab Home | ${usuario.especialidad} | Recordatorio: Evoluciones pendientes`,"enviado");
    setReminderSent(true);
  };

  const handleReagendar = async () => {
    if(!reagendaForm.fecha||!reagendaForm.hora||!reagendaForm.profesionalId) return;
    const row = await db.patch("pacientes",reagendando.id,{fecha:reagendaForm.fecha,hora:reagendaForm.hora,profesional_id:reagendaForm.profesionalId});
    if(Array.isArray(row)&&row[0]) setPacientes(prev=>prev.map(p=>p.id===reagendando.id?row[0]:p));
    const prof = profesionales.find(pr=>pr.id===reagendaForm.profesionalId);
    await logEmail("reagendamiento",reagendando.email,reagendando.nombre,`Rehab Home | ${prof?prof.especialidad:""} | Reagendamiento de sesión`,"enviado");
    setReagendaOk(true);
    setTimeout(()=>{ setReagendando(null);setReagendaOk(false); },1800);
  };

  const openReagendar = p => { setReagendando(p);setReagendaForm({fecha:p.fecha,hora:p.hora,profesionalId:p.profesional_id,motivo:""}); };
  const openAtencion = p => {
    setPacienteActivo(p);setVistaHistorial(false);
    const evo=getEvo(p.id);
    setForm(evo?{anamnesis:evo.anamnesis,procedimientos:evo.procedimientos,postSesion:evo.post_sesion}:{anamnesis:"",procedimientos:"",postSesion:""});
    setGuardado(false);setEmailStatus(null);setVista("atencion");
  };

  const ModalReagendar = () => !reagendando ? null : (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
      <div style={{background:"#fff",borderRadius:16,padding:24,width:340}}>
        {reagendaOk ? (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontSize:36,marginBottom:10}}>✅</div>
            <div style={{fontWeight:600,fontSize:15,color:"#155724"}}>Sesión reagendada</div>
          </div>
        ) : (<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div><p style={{fontWeight:600,fontSize:15,margin:0}}>Reagendar sesión</p><p style={{fontSize:12,color:"#6B7280",margin:0}}>{reagendando.nombre}</p></div>
            <button onClick={()=>setReagendando(null)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#9CA3AF"}}>×</button>
          </div>
          <div style={{background:"#FFF3CD",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#856404"}}>Actual: <strong>{reagendando.fecha}</strong> · <strong>{reagendando.hora}</strong></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={s.label}>Nueva fecha</label><input type="date" style={s.input} value={reagendaForm.fecha} onChange={e=>setReagendaForm(f=>({...f,fecha:e.target.value}))}/></div>
            <div><label style={s.label}>Nueva hora</label><input type="time" style={s.input} value={reagendaForm.hora} onChange={e=>setReagendaForm(f=>({...f,hora:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:10}}><label style={s.label}>Profesional</label>
            <select style={s.input} value={reagendaForm.profesionalId} onChange={e=>setReagendaForm(f=>({...f,profesionalId:e.target.value}))}>
              <option value="">Seleccionar...</option>
              {profesionales.filter(p=>p.activo).map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}
            </select>
          </div>
          <div style={{marginBottom:16}}><label style={s.label}>Motivo</label><textarea style={{...s.textarea,minHeight:60}} value={reagendaForm.motivo} onChange={e=>setReagendaForm(f=>({...f,motivo:e.target.value}))} placeholder="Ej: Solicitud del paciente..."/></div>
          <div style={{display:"flex",gap:8}}>
            <button style={{...s.btn("#1a6b8a"),flex:1}} onClick={handleReagendar}>Confirmar</button>
            <button style={s.btnOutline} onClick={()=>setReagendando(null)}>Cancelar</button>
          </div>
        </>)}
      </div>
    </div>
  );

  if(loading) return <div style={s.app}><Spinner/></div>;

  if(dbError) return (
    <div style={{...s.app,display:"flex",alignItems:"center",justifyContent:"center",minHeight:400}}>
      <div style={{textAlign:"center",maxWidth:360,padding:20}}>
        <div style={{fontSize:32,marginBottom:12}}>⚠️</div>
        <p style={{fontWeight:600,color:"#A32D2D",marginBottom:8}}>{dbError}</p>
        <p style={{fontSize:12,color:"#6B7280",marginBottom:16}}>Verifica que las tablas estén creadas en Supabase.</p>
        <button style={s.btn("#1a6b8a")} onClick={loadAll}>Reintentar conexión</button>
      </div>
    </div>
  );

  if(vista==="login") return (
    <div style={{...s.app,display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <div style={{width:320}}>
        <div style={{textAlign:"center",marginBottom:24}}>
          <div style={{display:"inline-block",marginBottom:10}}><LogoSVG size={80}/></div>
          <h1 style={{fontSize:20,fontWeight:700,margin:"0 0 4px",color:"#1a6b8a"}}>REHAB HOME</h1>
          <p style={{fontSize:13,color:"#6B7280"}}>Ingresa con tus credenciales</p>
        </div>
        <div style={{...s.card,padding:20}}>
          <div style={{marginBottom:12}}><label style={s.label}>RUT (o "admin")</label><input style={s.input} placeholder="12345678-9" value={loginForm.usuario} onChange={e=>setLoginForm(f=>({...f,usuario:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
          <div style={{marginBottom:16}}><label style={s.label}>Contraseña</label><input type="password" style={s.input} placeholder="••••••" value={loginForm.password} onChange={e=>setLoginForm(f=>({...f,password:e.target.value}))} onKeyDown={e=>e.key==="Enter"&&handleLogin()}/></div>
          {loginError && <div style={{fontSize:12,color:"#A32D2D",background:"#FCEBEB",borderRadius:6,padding:"6px 10px",marginBottom:12}}>{loginError}</div>}
          <button style={{...s.btn("#1a6b8a"),width:"100%",padding:10}} onClick={handleLogin}>Ingresar</button>
        </div>
        <p style={{fontSize:11,color:"#9CA3AF",textAlign:"center",marginTop:12,lineHeight:1.6}}>Profesionales: RUT sin puntos · clave = 5 primeros dígitos<br/>Admin: admin / admin2026</p>
      </div>
    </div>
  );

  if(vista==="agenda"&&rol==="profesional") {
    const lista = getPxProf(usuario.id,fechaSel);
    const pend = getPend(usuario.id,fechaSel);
    const esHoy = fechaSel===HOY;
    const fechaLabel = esHoy?"Hoy":new Date(fechaSel+"T00:00:00").toLocaleDateString("es-CL",{weekday:"long",day:"numeric",month:"long"});
    const irDia = offset => { const d=new Date(fechaSel+"T00:00:00");d.setDate(d.getDate()+offset);setFechaSel(d.toISOString().split("T")[0]); };
    const listaF = filtroPac.trim() ? getPxProf(usuario.id,null).filter(p=>p.nombre.toLowerCase().includes(filtroPac.toLowerCase())||p.rut.includes(filtroPac)) : lista;
    return (
      <div style={s.app}>
        <ModalReagendar/>
        <div style={s.header}>
          <div><p style={s.headerTitle}>{usuario.nombre}</p><p style={s.headerSub}>{usuario.especialidad}</p></div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:13,fontWeight:700,color:"#1a6b8a"}}>REHAB HOME</span>
            <button style={s.btnOutline} onClick={handleLogout}>Salir</button>
          </div>
        </div>
        <div style={s.section}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,background:"#fff",border:"1px solid #E5E7EB",borderRadius:10,padding:"8px 12px"}}>
            <button onClick={()=>irDia(-1)} style={{background:"none",border:"none",cursor:"pointer",color:"#6B7280",fontSize:18}}>‹</button>
            <div style={{flex:1,textAlign:"center"}}>
              <div style={{fontSize:14,fontWeight:600,textTransform:"capitalize"}}>{fechaLabel}</div>
              <input type="date" value={fechaSel} onChange={e=>setFechaSel(e.target.value)} style={{fontSize:11,color:"#9CA3AF",border:"none",background:"none",textAlign:"center",cursor:"pointer",fontFamily:"inherit",outline:"none",marginTop:2}}/>
            </div>
            <button onClick={()=>irDia(1)} style={{background:"none",border:"none",cursor:"pointer",color:"#6B7280",fontSize:18}}>›</button>
            {!esHoy && <button onClick={()=>setFechaSel(HOY)} style={{...s.badge("#E6F1FB","#185FA5"),cursor:"pointer",border:"none",fontSize:11}}>Hoy</button>}
          </div>
          <div style={{position:"relative",marginBottom:14}}>
            <input style={{...s.input,paddingLeft:32}} placeholder="Buscar por nombre o RUT (todas las fechas)..." value={filtroPac} onChange={e=>setFiltroPac(e.target.value)}/>
            {filtroPac && <button onClick={()=>setFiltroPac("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:"#9CA3AF",fontSize:18}}>×</button>}
          </div>
          {pendingAlert&&pend.length>0&&esHoy&&!filtroPac && (
            <div style={{background:"#FFF3CD",border:"1px solid #FBBF24",borderRadius:10,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
              <div><span style={{fontWeight:600,fontSize:13,color:"#856404"}}>⚠ {pend.length} evolución{pend.length>1?"es":""} pendiente{pend.length>1?"s":""}</span><div style={{fontSize:12,color:"#92600A",marginTop:2}}>{pend.map(p=>p.nombre).join(", ")}</div></div>
              <button style={{...s.btn("#D97706"),fontSize:12}} onClick={()=>{handleReminder();setPendingAlert(false);}}>{reminderSent?"✓ Enviado":"Recordatorio"}</button>
            </div>
          )}
          {!filtroPac && (
            <div style={{display:"flex",gap:10,marginBottom:14}}>
              {[["Completadas",lista.filter(p=>getEvo(p.id)).length,"#D4EDDA","#155724"],["Pendientes",pend.length,"#FFF3CD","#856404"],["Total",lista.length,"#E6F1FB","#185FA5"]].map(([lbl,cnt,bg,color])=>(

          {listaF.length===0 && <div style={{textAlign:"center",padding:"32px 0",color:"#9CA3AF"}}><div style={{fontSize:32,marginBottom:8}}>📅</div><div style={{fontSize:14}}>{filtroPac?`Sin resultados para "${filtroPac}"`:"Sin atenciones para este día"}</div></div>}
          {listaF.map(p=>{

            return (
              <div key={p.id} style={s.card}>
                <div style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{fontSize:14,fontWeight:700,color:usuario.color,minWidth:44,cursor:"pointer"}} onClick={()=>openAtencion(p)}>{p.hora}</div>
                  <div style={{flex:1,cursor:"pointer"}} onClick={()=>openAtencion(p)}>
                    <div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div>
                    <div style={{fontSize:12,color:"#6B7280"}}>{p.rut}{p.comuna?` · ${p.comuna}`:""}</div>
                    {filtroPac && <div style={{fontSize:11,color:"#9CA3AF"}}>{p.fecha} · {p.hora}</div>}
                  </div>
                  <span style={s.badge(hecho?"#D4EDDA":"#FFF3CD",hecho?"#155724":"#856404")}>{hecho?"Completada":"Pendiente"}</span>
                  <button style={{...s.btnOutline,fontSize:12,padding:"5px 10px"}} onClick={()=>openReagendar(p)}>Reagendar</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  if(vista==="atencion"&&pacienteActivo) {
    const prof = profesionales.find(p=>p.id===pacienteActivo.profesional_id);
    const color = prof?prof.color:"#1a6b8a";
    const evoActual = getEvo(pacienteActivo.id);
    const historial = evoluciones.filter(e=>e.paciente_id===pacienteActivo.id);
    return (
      <div style={s.app}>
        <ModalReagendar/>
        <div style={s.header}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button style={s.btnOutline} onClick={()=>setVista(rol==="admin"?"admin":"agenda")}>← Volver</button>

          <div style={{display:"flex",gap:8}}>
            <button style={{...s.btnOutline,fontSize:12}} onClick={()=>openReagendar(pacienteActivo)}>📅 Reagendar</button>

                <p style={{fontWeight:600,fontSize:13,margin:"0 0 16px"}}>Emails por tipo</p>
                <div style={{display:"flex",gap:20,alignItems:"flex-end",justifyContent:"center"}}>
                  {[["Evoluciones",evoEm,"#1D9E75"],["Recordatorios",recEm,"#378ADD"],["Reagendamientos",reaEm,"#7F77DD"]].map(([lbl,val,color])=>(<div key={lbl} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><Bar value={val} max={maxEm} color={color}/><span style={{fontSize:10,color:"#6B7280",textAlign:"center",maxWidth:64,lineHeight:1.2}}>{lbl}</span></div>))}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
