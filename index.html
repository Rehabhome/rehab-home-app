// ── Excel import helpers ──────────────────────────────────────────────────────
const parseImportDate = d => {
  if (!d) return '';
  d = String(d).split(' ')[0].trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  const sep = d.includes('/') ? '/' : '-';
  const p = d.split(sep);
  if (p.length === 3 && p[0].length <= 2) return `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
  return d;
};
const parseImportHora = h => {
  if (!h) return '';
  const m = String(h).match(/(\d{1,2}):(\d{2})/);
  return m ? `${m[1].padStart(2,'0')}:${m[2]}` : '';
};
const parseExcelPaste = (text, profesionales) => {
  const lines = text.split('\n').map(l=>l.trimEnd()).filter(l=>l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split('\t').map(h=>h.trim().toLowerCase().replace(/[\s\n"]+/g,' '));
  const idx = (...terms) => { for (const t of terms){ const i=headers.findIndex(h=>h.includes(t)); if(i>=0)return i; } return -1; };
  const cols = {
    nombre: idx('nombre paciente','nombre'),
    rut:    idx('rut paciente','rut'),
    email:  idx('mail','email','correo'),
    dir:    idx('direcci'),
    com:    idx('comuna'),
    fecha:  idx('fecha visita'),
    hora:   idx('hora visita','hora'),
    prof:   idx('profesional asignado','profesional'),
    diag:   idx('diagn'),
    tel:    idx('tel'),
  };
  return lines.slice(1).map((line,i) => {
    const c = line.split('\t');
    const g = k => cols[k]>=0 ? (c[cols[k]]||'').trim() : '';
    const profNombre = g('prof');
    const profMatch = profesionales.find(p=>p.nombre?.toLowerCase()===profNombre.toLowerCase());
    const row = {
      _idx:i, nombre:g('nombre'), rut:g('rut'), email:g('email'),
      direccion:g('dir'), comuna:g('com'),
      fecha:parseImportDate(g('fecha')), hora:parseImportHora(g('hora')),
      profesional_id: profMatch?profMatch.id:null,
      profNombre, diagnostico:g('diag'), telefono:g('tel'),
    };
    row._ok = !!(row.nombre && row.rut && row.fecha && row.profesional_id);
    return row;
  }).filter(r=>r.nombre&&r.rut);
};

              {[["anamnesis","Anamnesis","Motivo de consulta..."],["procedimientos","Procedimientos realizados","Técnicas aplicadas..."],["postSesion","Post sesión","Evolución, indicaciones..."]].map(([key,lbl,ph])=>(

      const blob=new Blob(["\uFEFF"+contenido],{type:"text/csv;charset=utf-8;"});

          <div style={s.section}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p style={{margin:0,fontWeight:600}}>Profesionales ({profesionales.length})</p>
              <button style={s.btn("#1a6b8a")} onClick={()=>setShowNewProf(!showNewProf)}>+ Agregar</button>
            </div>
            {showNewProf && (
              <div style={{...s.card,padding:16,marginBottom:14,background:"#F0FDF4"}}>
                <p style={{fontWeight:600,fontSize:14,margin:"0 0 12px"}}>Nuevo profesional</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[["nombre","Nombre"],["rut","RUT"],["email","Email"]].map(([k,lbl])=>(<div key={k}><label style={s.label}>{lbl}</label><input style={s.input} value={newProf[k]} onChange={e=>setNewProf(f=>({...f,[k]:e.target.value}))}/></div>))}
                  <div><label style={s.label}>Especialidad</label><select style={s.input} value={newProf.especialidad} onChange={e=>setNewProf(f=>({...f,especialidad:e.target.value}))}>{ESPECIALIDADES.map(e=><option key={e}>{e}</option>)}</select></div>
                  <div><label style={s.label}>Color</label><div style={{display:"flex",gap:6,marginTop:4}}>{COLORES.map(c=><div key={c} onClick={()=>setNewProf(f=>({...f,color:c}))} style={{width:24,height:24,borderRadius:"50%",background:c,cursor:"pointer",border:newProf.color===c?"3px solid #1a1a2e":"2px solid transparent"}}/>)}</div></div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button style={s.btn("#1a6b8a")} onClick={async()=>{ if(!newProf.nombre||!newProf.rut||!newProf.email)return; const row=await db.post("profesionales",{...newProf,activo:true}); if(Array.isArray(row)&&row[0])setProfesionales(prev=>[...prev,row[0]]); setNewProf({nombre:"",especialidad:"Kinesiología",rut:"",email:"",color:COLORES[0]});setShowNewProf(false); }}>Guardar</button>
                  <button style={s.btnOutline} onClick={()=>setShowNewProf(false)}>Cancelar</button>
                </div>
                <p style={{fontSize:11,color:"#6B7280",marginTop:8}}>Clave = primeros 5 dígitos del RUT.</p>
              </div>
            )}
            {profesionales.map(p=>(
              <div key={p.id} style={{...s.card,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:p.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:p.color,flexShrink:0}}>{p.nombre.split(" ").map(n=>n[0]).join("").slice(0,2)}</div>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div><div style={{fontSize:12,color:"#6B7280"}}>{p.especialidad} · {p.rut}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{p.email} · clave: {getPassword(p.rut)}</div></div>
                <span style={s.badge(p.activo?"#D4EDDA":"#F3F4F6",p.activo?"#155724":"#6B7280")}>{p.activo?"Activo":"Inactivo"}</span>
                <button style={p.activo?s.btnDanger:s.btnSuccess} onClick={async()=>{ const row=await db.patch("profesionales",p.id,{activo:!p.activo}); if(Array.isArray(row)&&row[0])setProfesionales(prev=>prev.map(x=>x.id===p.id?row[0]:x)); }}>{p.activo?"Inactivar":"Activar"}</button>
              </div>
            ))}
          </div>
        )}

        {adminTab==="pacientes" && (
          <div style={s.section}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p style={{margin:0,fontWeight:600}}>Pacientes ({[...new Set(pacientes.map(p=>p.rut))].length})</p>
              <div style={{display:"flex",gap:8}}>
                <button style={{...s.btnOutline,fontSize:12}} onClick={()=>{setShowImport(v=>!v);setShowNewPac(false);setPasteText('');setImportPreview(null);}}>📋 Importar Excel</button>
                <button style={s.btn("#1a6b8a")} onClick={()=>{setShowNewPac(!showNewPac);setShowImport(false);}}>+ Agregar</button>
              </div>
            </div>
            {showImport && (
              <div style={{...s.card,padding:16,marginBottom:14,background:"#F0F4FF"}}>
                <p style={{fontWeight:600,fontSize:14,margin:"0 0 8px"}}>📋 Importar desde Excel</p>
                <p style={{fontSize:12,color:"#6B7280",margin:"0 0 10px"}}>Copia las filas de tu Excel (incluyendo la fila de cabecera) y pégalas aquí.</p>
                {!importPreview ? (<>
                  <textarea style={{...s.textarea,minHeight:100,fontFamily:"monospace",fontSize:11}} value={pasteText} onChange={e=>setPasteText(e.target.value)} placeholder={"ID\tFecha y Hora Recepción\t...\nPegar aquí con Ctrl+V"}/>
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <button style={s.btn("#4F46E5")} onClick={()=>{const rows=parseExcelPaste(pasteText,profesionales);setImportPreview(rows.length?rows:null);if(!rows.length)alert("No se encontraron filas válidas. Asegúrate de pegar incluyendo la cabecera.");}} disabled={!pasteText.trim()}>Procesar</button>
                    <button style={s.btnOutline} onClick={()=>{setShowImport(false);setPasteText('');}}>Cancelar</button>
                  </div>
                </>) : (<>
                  <p style={{fontSize:13,fontWeight:600,marginBottom:8,color:"#155724"}}>{importPreview.length} sesión{importPreview.length!==1?"es":""} detectada{importPreview.length!==1?"s":""}</p>
                  <div style={{overflowX:"auto",marginBottom:10}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                      <thead><tr style={{background:"#E0E7FF"}}>{["Nombre","RUT","Fecha","Hora","Profesional","Diag","Estado"].map(h=><th key={h} style={{padding:"4px 8px",textAlign:"left",fontWeight:600}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {importPreview.map((r,i)=>(
                          <tr key={i} style={{background:r._ok?"#F0FFF4":"#FFF3CD",borderBottom:"1px solid #E5E7EB"}}>
                            <td style={{padding:"4px 8px"}}>{r.nombre}</td>
                            <td style={{padding:"4px 8px"}}>{r.rut}</td>
                            <td style={{padding:"4px 8px"}}>{r.fecha}</td>
                            <td style={{padding:"4px 8px"}}>{r.hora}</td>
                            <td style={{padding:"4px 8px",color:r.profesional_id?"inherit":"#D97706"}}>{r.profesional_id?r.profNombre:`⚠ ${r.profNombre||"Sin asignar"}`}</td>
                            <td style={{padding:"4px 8px"}}>{r.diagnostico}</td>
                            <td style={{padding:"4px 8px"}}>{r._ok?"✓":"⚠ revisar"}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  {importPreview.some(r=>!r._ok) && <p style={{fontSize:12,color:"#92600A",marginBottom:8}}>⚠ Las filas en amarillo tienen datos incompletos (profesional no encontrado o fecha/RUT faltante). Igual se importarán.</p>}
                  <div style={{display:"flex",gap:8}}>
                    <button style={s.btn("#155724")} onClick={handleImport} disabled={importando}>{importando?"Importando...":"✓ Importar "+importPreview.length+" sesiones"}</button>
                    <button style={s.btnOutline} onClick={()=>setImportPreview(null)}>← Volver</button>
                    <button style={s.btnOutline} onClick={()=>{setShowImport(false);setPasteText('');setImportPreview(null);}}>Cancelar</button>
                  </div>
                </>)}
              </div>
            )}
            {showNewPac && (
              <div style={{...s.card,padding:16,marginBottom:14,background:"#F0FDF4"}}>
                <p style={{fontWeight:600,fontSize:14,margin:"0 0 12px"}}>Nuevo paciente</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[["nombre","Nombre"],["rut","RUT"],["email","Email"],["direccion","Dirección"],["hora","Hora"],["fecha","Fecha"]].map(([k,lbl])=>(<div key={k}><label style={s.label}>{lbl}</label><input style={s.input} value={newPac[k]} onChange={e=>setNewPac(f=>({...f,[k]:e.target.value}))}/></div>))}
                  <div><label style={s.label}>Comuna</label><select style={s.input} value={newPac.comuna} onChange={e=>setNewPac(f=>({...f,comuna:e.target.value}))}><option value="">Seleccionar...</option>{COMUNAS.map(c=><option key={c}>{c}</option>)}</select></div>
                  <div><label style={s.label}>Profesional</label><select style={s.input} value={newPac.profesionalId} onChange={e=>setNewPac(f=>({...f,profesionalId:e.target.value}))}><option value="">Seleccionar...</option>{profesionales.filter(p=>p.activo).map(p=><option key={p.id} value={p.id}>{p.nombre}</option>)}</select></div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button style={s.btn("#1a6b8a")} onClick={async()=>{ if(!newPac.nombre||!newPac.rut||!newPac.email||!newPac.profesionalId)return;                   const row=await db.post("pacientes",{nombre:newPac.nombre,rut:newPac.rut,email:newPac.email,direccion:newPac.direccion,comuna:newPac.comuna,hora:newPac.hora,fecha:newPac.fecha,profesional_id:newPac.profesionalId}); if(Array.isArray(row)&&row[0])setPacientes(prev=>[...prev,row[0]]); setNewPac({nombre:"",rut:"",direccion:"",comuna:"",email:"",profesionalId:"",hora:"",fecha:HOY});setShowNewPac(false); }}>Guardar</button>
                  <button style={s.btnOutline} onClick={()=>setShowNewPac(false)}>Cancelar</button>
                </div>
              </div>
            )}
            {editingPac && (
              <div style={{...s.card,padding:16,marginBottom:14,background:"#EFF6FF"}}>
                <p style={{fontWeight:600,fontSize:14,margin:"0 0 12px"}}>Editar paciente</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {[["nombre","Nombre"],["rut","RUT"],["email","Email"],["direccion","Dirección"]].map(([k,lbl])=>(<div key={k}><label style={s.label}>{lbl}</label><input style={s.input} value={editingPac[k]||""} onChange={e=>setEditingPac(f=>({...f,[k]:e.target.value}))}/></div>))}
                  <div><label style={s.label}>Comuna</label><select style={s.input} value={editingPac.comuna||""} onChange={e=>setEditingPac(f=>({...f,comuna:e.target.value}))}><option value="">Seleccionar...</option>{COMUNAS.map(c=><option key={c}>{c}</option>)}</select></div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button style={s.btn("#378ADD")} onClick={async()=>{                   const row=await db.patch("pacientes",editingPac.id,{nombre:editingPac.nombre,rut:editingPac.rut,email:editingPac.email,direccion:editingPac.direccion,comuna:editingPac.comuna}); if(Array.isArray(row)&&row[0])setPacientes(prev=>prev.map(p=>p.id===editingPac.id?row[0]:p)); setEditingPac(null); }}>Guardar</button>
                  <button style={s.btnOutline} onClick={()=>setEditingPac(null)}>Cancelar</button>
                </div>
              </div>
            )}
            {[...new Map([...pacientes].sort((a,b)=>new Date(b.fecha||0)-new Date(a.fecha||0)).map(p=>[p.rut,p])).values()].map(p=>{
              const prof=profesionales.find(pr=>pr.id===p.profesional_id);
              return (
                <div key={p.id} style={{...s.card,padding:"11px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{p.nombre}</div><div style={{fontSize:12,color:"#6B7280"}}>{p.rut} · {p.email}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{prof?prof.nombre:"-"} · {p.hora} · {p.fecha}</div></div>
                  <button style={s.btnOutline} onClick={()=>setEditingPac({...p})}>Editar</button>
                  <button style={{...s.btnOutline,fontSize:12,padding:"5px 10px"}} onClick={()=>openReagendar(p)}>Reagendar</button>
                  <button style={{...s.btnOutline,fontSize:12}} onClick={()=>openAtencion(p)}>Ver</button>
                </div>
              );
            })}
          </div>
        )}

        {adminTab==="emails" && (
          <div style={s.section}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <p style={{margin:0,fontWeight:600}}>Emails ({emailLog.length})</p>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {[["todos","Todos"],["evolucion","Evoluciones"],["recordatorio","Recordatorios"],["reagendamiento","Reagendamientos"]].map(([v,lbl])=>(
                  <button key={v} onClick={()=>setEmailFilter(v)} style={{background:emailFilter===v?"#1a6b8a":"#fff",color:emailFilter===v?"#fff":"#6B7280",border:"1px solid #E5E7EB",borderRadius:20,padding:"4px 12px",cursor:"pointer",fontSize:12}}>{lbl}</button>
                ))}
              </div>
            </div>
            {emailsF.map(e=>(
              <div key={e.id} style={{...s.card,padding:"11px 16px",display:"flex",alignItems:"center",gap:12}}>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{e.asunto}</div><div style={{fontSize:12,color:"#6B7280"}}>{e.destinatario} · {e.fecha} {e.hora}</div></div>
                <span style={s.badge("#E6F1FB","#185FA5")}>{e.tipo==="evolucion"?"Evolución":e.tipo==="recordatorio"?"Recordatorio":"Reagendamiento"}</span>
                <span style={s.badge(e.estado==="enviado"?"#D4EDDA":"#FCEBEB",e.estado==="enviado"?"#155724":"#A32D2D")}>{e.estado==="enviado"?"✓":"✗"}</span>
              </div>
            ))}
          </div>
        )}

        {adminTab==="estadisticas" && (
          <div style={s.section}>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}>
              <button style={{...s.btn("#1a6b8a"),display:"flex",alignItems:"center",gap:6}} onClick={exportExcel}>📥 Exportar Excel</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
              {[["Pacientes",pacientes.length,"#E6F1FB","#185FA5"],["Evoluciones",evoluciones.length,"#D4EDDA","#155724"],["Pendientes",pacientes.filter(p=>!getEvo(p.id)).length,"#FFF3CD","#856404"],["Emails",emailLog.filter(e=>e.estado==="enviado").length,"#EAF3DE","#3B6D11"]].map(([lbl,val,bg,color])=>(
                <div key={lbl} style={{background:bg,borderRadius:10,padding:"14px 10px",textAlign:"center"}}>
                  <div style={{fontSize:24,fontWeight:700,color}}>{val}</div>
                  <div style={{fontSize:11,color,marginTop:2}}>{lbl}</div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div style={{...s.card,padding:16}}>
                <p style={{fontWeight:600,fontSize:13,margin:"0 0 16px"}}>Atenciones por profesional</p>
                <div style={{display:"flex",gap:16,alignItems:"flex-end",justifyContent:"center"}}>
                  {atencionesProf.map(p=>(<div key={p.nombre} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><Bar value={p.total} max={maxAt} color={p.color}/><span style={{fontSize:10,color:"#6B7280",textAlign:"center",maxWidth:60,lineHeight:1.2}}>{p.nombre}</span></div>))}
                </div>
              </div>
              <div style={{...s.card,padding:16}}>
                <p style={{fontWeight:600,fontSize:13,margin:"0 0 12px"}}>Completadas vs Pendientes</p>
                {atencionesProf.map(p=>{const pct=p.total>0?Math.round((p.comp/p.total)*100):0;return(<div key={p.nombre} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12}}>{p.nombre}</span><span style={{fontSize:12,fontWeight:600,color:pct===100?"#155724":pct>=50?"#856404":"#A32D2D"}}>{pct}%</span></div><div style={{height:8,background:"#F3F4F6",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,background:p.color,borderRadius:4}}/></div><div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>{p.comp} completadas · {p.total-p.comp} pendientes</div></div>);})}
              </div>
              <div style={{...s.card,padding:16}}>
                <p style={{fontWeight:600,fontSize:13,margin:"0 0 16px"}}>Por especialidad</p>
                <div style={{display:"flex",gap:16,alignItems:"flex-end",justifyContent:"center"}}>
                  {especData.map(([esp,cnt],i)=>(<div key={esp} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><Bar value={cnt} max={maxEs} color={COLORES[i%COLORES.length]}/><span style={{fontSize:10,color:"#6B7280",textAlign:"center",maxWidth:65,lineHeight:1.2}}>{esp}</span></div>))}
                </div>
              </div>
              <div style={{...s.card,padding:16}}>
                <p style={{fontWeight:600,fontSize:13,margin:"0 0 16px"}}>Emails por tipo</p>
                <div style={{display:"flex",gap:20,alignItems:"flex-end",justifyContent:"center"}}>
                  {[["Evoluciones",evoEm,"#1D9E75"],["Recordatorios",recEm,"#378ADD"],["Reagendamientos",reaEm,"#7F77DD"]].map(([lbl,val,color])=>(<div key={lbl} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6}}><Bar value={val} max={maxEm} color={color}/><span style={{fontSize:10,color:"#6B7280",textAlign:"center",maxWidth:64,lineHeight:1.2}}>{lbl}</span></div>))}
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
